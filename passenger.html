<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passenger Portal</title>

<style>
:root {
--bg-primary-beige: #F9F7F2;
--struct-blue-gray: #4A5D6A;
--accent-burgundy: #800000;
--white-surface: #ffffff;
}

body {
margin: 0;
font-family: 'Segoe UI', sans-serif;
background-color: var(--bg-primary-beige);
}

/* NAVBAR */
.navbar {
background-color: var(--struct-blue-gray);
color: white;
padding: 20px 6%;
display: flex;
justify-content: space-between;
align-items: center;
}

.navbar a {
color: white;
text-decoration: none;
font-weight: bold;
margin-left: 20px;
}

/* CARD */
.container {
max-width: 600px;
margin: 100px auto;
background: var(--white-surface);
padding: 40px;
border-radius: 20px;
box-shadow: 0 20px 40px rgba(0,0,0,0.1);
border-bottom: 10px solid var(--accent-burgundy);
}

h1 {
text-align: center;
color: var(--struct-blue-gray);
}

input {
width: 100%;
padding: 12px;
margin: 15px 0;
border-radius: 10px;
border: 1px solid #ccc;
}

button {
width: 100%;
padding: 15px;
background: var(--accent-burgundy);
color: white;
border: none;
border-radius: 30px;
font-weight: bold;
cursor: pointer;
}

button:hover {
background: var(--struct-blue-gray);
}
</style>
</head>

<body>

<div class="navbar">
<div><b>RailSys</b></div>
<div>
<a href="index.html">Home</a>
<a href="booking.html">Booking</a>
</div>
</div>

<div class="container">
<h1>Create Passenger Profile</h1>

<form>
<input type="text" placeholder="Full Name">
<input type="text" placeholder="Passenger ID">
<button>Create Profile</button>
</form>
</div>

</body>
</html>
